<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sicilia 2026 — Cuaderno de Viaje</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HERO -->
  <header class="site-hero">
    <div class="hero-overlay"></div>

    <div class="hero-top">
<div class="hero-stats">
        <div class="stat"><span class="stat-num" id="total-places">0</span><span class="stat-label">Lugares</span></div>
        <div class="stat"><span class="stat-num" id="total-tickets">0</span><span class="stat-label">Entradas</span></div>
        <div class="stat"><span class="stat-num">8</span><span class="stat-label">Días</span></div>
      </div>
    </div>

    <div class="hero-center">
      <h1 class="hero-title">Sicilia <span class="hero-year">2026</span></h1>
      <p class="hero-dates">1 - 8 de Julio</p>
      <div class="sync-badge" id="sync-badge"></div>
    </div>

    <div class="hero-days">
      <div class="days-nav" id="days-nav"></div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="main-wrapper">

    <div class="top-bar">
      <div id="day-header-bar"></div>
    </div>

    <div class="content-grid">
      <section class="places-panel">
        <div class="days-content" id="days-content"></div>
      </section>

      <aside class="map-panel">
        <div class="map-header">
          <span class="map-title">Mapa del Viaje</span>
          <div class="map-legend">
            <span class="legend-dot legend-visited"></span> Visitado
            <span class="legend-dot legend-pending"></span> Pendiente
          </div>
        </div>
        <div id="map"></div>
        <div class="map-info" id="map-info">
          <p>Haz clic en un marcador para ver detalles</p>
        </div>
      </aside>
    </div>

  </main>

  <!-- MODAL: Confirmar acción -->
  <div class="modal-overlay" id="confirm-overlay">
    <div class="modal confirm-modal">
      <div class="confirm-icon">🗑</div>
      <h3 class="confirm-title">Eliminar lugar</h3>
      <p class="confirm-msg">¿Seguro que quieres eliminar este lugar? Esta acción no se puede deshacer.</p>
      <div class="form-actions">
        <button class="btn btn-secondary" id="confirm-cancel">Cancelar</button>
        <button class="btn btn-danger"    id="confirm-ok">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Añadir/editar lugar -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Añadir Lugar</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="place-form">
        <input type="hidden" id="form-day" />
        <input type="hidden" id="form-edit-id" />

        <div class="form-group">
          <label>Nombre del lugar *</label>
          <input type="text" id="form-name" placeholder="Ej: Valle dei Templi" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Hora (opcional)</label>
            <input type="time" id="form-time" />
          </div>
          <div class="form-group">
            <label>Categoría</label>
            <select id="form-category">
              <option value="cultura">🏛 Cultura</option>
              <option value="naturaleza">🌿 Naturaleza</option>
              <option value="gastronomia">🍕 Gastronomía</option>
              <option value="playa">🏖 Playa</option>
              <option value="alojamiento">🏨 Alojamiento</option>
              <option value="transporte">🚗 Transporte</option>
              <option value="otro">📍 Otro</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Notas</label>
          <textarea id="form-notes" placeholder="Notas, horarios, consejos..." rows="3"></textarea>
        </div>

        <div class="form-group tickets-group">
          <label class="checkbox-label">
            <input type="checkbox" id="form-tickets" />
            <span class="checkbox-custom"></span>
            Requiere entrada / reserva previa
          </label>
          <input type="text" id="form-ticket-info" class="ticket-info-input" placeholder="Info de la entrada (precio, web, etc.)" />
        </div>

        <div class="form-group">
          <label>Ubicación en el mapa</label>
          <div class="location-search">
            <input type="text" id="form-location-search" placeholder="Buscar lugar..." />
            <button type="button" class="btn-search" id="btn-location-search">Buscar</button>
          </div>
          <div class="coords-display" id="coords-display">Sin ubicación</div>
          <div id="mini-map"></div>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="form-visited" />
            <span class="checkbox-custom"></span>
            Marcar como visitado ✓
          </label>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar Lugar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
